<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:340px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#ff4d6d;
    margin-bottom:15px;
}

p{
    color:#555;
    margin-bottom:20px;
    line-height:1.6;
}

button{
    background:#ff4d6d;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#message{
    margin-top:20px;
    color:#e91e63;
    font-weight:bold;
    min-height:30px;
}

.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation:fall 5s linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100vh);
        opacity:1;
    }
    to{
        transform:translateY(100vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>❤️ Hello!</h1>
    <p>
        Ada sesuatu yang ingin kusampaikan...
    </p>

    <button onclick="showMessage()">
        Klik di sini
    </button>

    <div id="message"></div>
</div>

<script>

const messages=[
"Semoga harimu selalu menyenangkan 😊",
"Kamu luar biasa, tetap semangat ya! 🌸",
"Terima kasih sudah menjadi dirimu sendiri ❤️",
"Semoga semua impianmu tercapai ✨",
"Have a wonderful day! 💖"
];

function showMessage(){
    let random=Math.floor(Math.random()*messages.length);
    document.getElementById("message").innerHTML=messages[random];
}

function createHeart(){
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*3)+"s";
    heart.style.fontSize=(15+Math.random()*25)+"px";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
